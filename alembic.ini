# alembic.ini
#
# Why this file exists:
#   Configuration for the Alembic migrations CLI. It tells Alembic where
#   migration scripts live, how to name new revisions, and how to log.
#
#   IMPORTANT: the database URL is deliberately NOT set here. Hardcoding
#   credentials in a committed file is exactly what `.env` exists to avoid.
#   Instead, `alembic/env.py` injects the URL at runtime from our pydantic
#   Settings (which read `.env`), giving a single source of truth and
#   keeping secrets out of version control.

[alembic]
# Location of the migration environment (env.py, versions/, etc.).
script_location = alembic

# Ensure the project root is importable so env.py can `import app...`.
prepend_sys_path = .

# Filename template for new revisions. The date prefix makes the versions/
# directory sort chronologically and reads clearly at a glance.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Interpret timestamps in UTC for stable, timezone-independent filenames.
timezone = UTC

# sqlalchemy.url is intentionally left blank — see note above. env.py sets
# it from app settings before migrations run.
sqlalchemy.url =


# --- Logging ----------------------------------------------------------
# Standard Alembic logging configuration so migration runs print useful
# output. (Separate from the application's own logging setup in main.py.)
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
