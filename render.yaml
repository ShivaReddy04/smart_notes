# render.yaml — Render Blueprint (Infrastructure as Code)
#
# Why this file exists:
#   Describes the WHOLE deployment to Render in one committed file so the stack
#   is reproducible: create it once from this Blueprint and every later push
#   redeploys with the same config. Two services are defined:
#
#     * api  -> the FastAPI backend, built from the existing Dockerfile.
#     * web  -> the React SPA, built with Vite and served as a static site.
#
#   This Blueprint targets Render's FREE tier end-to-end:
#     * No torch: embeddings come from a hosted API (Google Gemini). The
#       backend fits the free 512 MB RAM limit.
#     * No persistent disk: vectors live in Postgres (pgvector, on Neon) and
#       image bytes live in Supabase Storage (S3-compatible). No disks needed.
#   PostgreSQL is NOT defined here — the app uses Neon (remote), supplied via
#   DATABASE_URL, which also hosts the pgvector index.
#
#   Free-tier caveat: a free web service spins down after ~15 min idle; the
#   next request wakes it and takes ~50s. Fine for personal / demo use.
#
#   How to use it: push this file, then in Render: New + -> Blueprint -> pick
#   this repo. Render reads this file and provisions both services. Then set the
#   secret env vars (marked sync:false) in the dashboard.

services:
  # --- Backend API ----------------------------------------------------
  - type: web
    name: ai-smart-notes-api
    runtime: docker              # Build from ./Dockerfile.
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon               # Pick the region nearest you / nearest Neon.
    plan: free                   # 512 MB RAM. Enough now that torch is gone.
    healthCheckPath: /health     # Matches the /health route in app/main.py.
    autoDeploy: true             # Redeploy automatically on every push to the branch.

    # NOTE: no `disk:` block. The free tier does not support persistent disks,
    # and nothing needs one anymore — vectors are in Postgres and images in S3.

    envVars:
      # --- Secrets: set these in the Render dashboard, never commit them. ---
      # sync:false tells Render "this value is managed in the UI" so the
      # Blueprint does not overwrite it and it stays out of git.
      - key: DATABASE_URL          # Neon URL: postgresql+psycopg2://...  (must have the `vector` extension available)
        sync: false
      - key: OPENROUTER_API_KEY    # Chat/categorization. From https://openrouter.ai/keys
        sync: false
      - key: EMBEDDING_API_KEY     # Embeddings. Free Google AI Studio key: https://aistudio.google.com/apikey
        sync: false
      # Browser origins allowed to call this API. MUST be a JSON array and MUST
      # include the deployed frontend URL, e.g. ["https://ai-smart-notes-web.onrender.com"].
      # Set after the web service gets its URL (see the steps).
      - key: CORS_ORIGINS
        sync: false
      # JWT signing secret (Phase 6 auth). Generate a long random string:
      #   python -c "import secrets; print(secrets.token_urlsafe(48))"
      # Set it in the dashboard and NEVER commit it.
      - key: JWT_SECRET_KEY
        sync: false

      # --- S3-compatible image storage (Supabase) — secrets in dashboard. ---
      - key: S3_ENDPOINT_URL        # Supabase: https://<project_ref>.supabase.co/storage/v1/s3
        sync: false
      - key: S3_ACCESS_KEY_ID       # Supabase Storage -> S3 Access Keys
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET              # The (public) bucket name.
        sync: false
      - key: S3_PUBLIC_BASE_URL     # https://<project_ref>.supabase.co/storage/v1/object/public/<bucket>
        sync: false

      # --- Non-secret config (safe to keep in the Blueprint). ---
      - key: IMAGE_STORAGE_BACKEND  # Use S3 in production (free tier has no disk).
        value: s3
      - key: S3_REGION              # Your Supabase project region (Storage settings), e.g. us-east-1.
        value: us-east-1
      - key: EMBEDDING_BASE_URL     # Gemini's OpenAI-compatible endpoint.
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: EMBEDDING_DIMENSIONS   # MUST match the pgvector column in migration 0004.
        value: "768"
      - key: OPENROUTER_MODEL      # A FREE OpenRouter model (no credits needed).
        value: google/gemma-4-26b-a4b-it:free
      - key: DEBUG
        value: "false"

  # --- Frontend SPA (Vite static build) -------------------------------
  - type: web
    name: ai-smart-notes-web
    runtime: static              # No server: Render serves the built files on its CDN.
    rootDir: frontend            # Run the build inside the frontend/ package.
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist    # Vite outputs here (relative to rootDir).
    autoDeploy: true

    envVars:
      # Injected at BUILD time by Vite (see frontend/src/api/client.ts). Must be
      # the API service's public URL WITH the /api/v1 suffix. Set it once the api
      # service has a URL, e.g. https://ai-smart-notes-api.onrender.com/api/v1
      - key: VITE_API_BASE_URL
        sync: false

    # SPA fallback: any path that is not a real file returns index.html so the
    # client-side router can resolve it (replaces the nginx try_files rule).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
