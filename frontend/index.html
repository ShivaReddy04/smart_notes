<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Smart Notes</title>
    <!--
      Apply the saved (or OS-preferred) theme BEFORE React mounts so there is no
      flash of the wrong theme. Mirrors lib/theme.ts — keep the storage key
      ('ai-smart-notes-theme') and the class ('dark') in sync with that file.
    -->
    <script>
      try {
        var saved = localStorage.getItem('ai-smart-notes-theme')
        var dark =
          saved === 'dark' ||
          (!saved && matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      } catch (e) {
        /* localStorage blocked (private mode) — default light, no crash. */
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
