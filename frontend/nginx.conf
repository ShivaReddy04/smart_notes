# frontend/nginx.conf
#
# Why this file exists:
#   nginx serves the built SPA AND reverse-proxies the API + media to the
#   backend container, so the browser sees ONE origin. Same origin means the
#   frontend calls /api/v1 and /media as relative paths and there are no CORS
#   concerns at all.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Uploaded images can be up to 5 MB (backend cap); allow headroom so nginx
    # does not reject them before they reach FastAPI (default limit is 1 MB).
    client_max_body_size 10m;

    # SPA routing: for any path that is not a real file, return index.html and
    # let React Router (client side) resolve it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API -> FastAPI. "api" is the compose service name, resolvable on the
    # internal Docker network.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded note images -> FastAPI's StaticFiles mount at /media.
    location /media/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }
}
